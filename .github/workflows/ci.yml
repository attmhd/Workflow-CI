name: Train and Push ML Model

on:
  push:
    paths:
      - 'MLProject/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false

      - name: Install dependencies
        run: |
          uv venv
          . .venv/bin/activate
          uv pip install mlflow==2.19.0 cloudpickle==3.1.2 numpy==2.5.1 pandas==2.3.3 rich==15.0.0 scikit-learn==1.9.0 scipy==1.18.0 imbalanced-learn dagshub matplotlib seaborn

      - name: Run modelling script
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
        run: |
          . .venv/bin/activate
          mlflow run MLProject --env-manager=local

      - name: Set MLflow model path
        id: get_model
        run: |
          echo "MODEL_PATH=MLProject/tuned_model_local" >> $GITHUB_ENV
          echo "Model path set to: MLProject/tuned_model_local"

      - name: Build Docker image
        run: |
          . .venv/bin/activate
          mlflow models generate-dockerfile -m ${{ env.MODEL_PATH }} -d docker_context
          sed -i 's|https://bootstrap.pypa.io/get-pip.py|https://bootstrap.pypa.io/pip/3.9/get-pip.py|g' docker_context/Dockerfile
          docker build -t diabetes-model docker_context

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag diabetes-model:latest ${{ secrets.DOCKER_USERNAME }}/diabetes-model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/diabetes-model:latest

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuned-model
          path: ${{ env.MODEL_PATH }}

      - name: Commit and push model artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Artifacts uploaded and Docker image pushed from workflow run [skip ci]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}